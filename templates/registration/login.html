{% extends "base.html" %}

{% block title %}Ingresar | Distrifármacos{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="login-card p-4 p-md-5">
      <div class="mb-4">
        <div class="text-uppercase text-muted small fw-semibold">Acceso</div>
        <h1 class="h3 mb-2">Ingresar al sistema</h1>
        <p class="text-muted mb-0">Autenticación para el panel de Distrifármacos.</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger border-0">Usuario o contraseña incorrectos.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_username">Usuario</label>
          <input class="form-control" type="text" name="username" autofocus required id="id_username">
        </div>
        <div class="mb-4">
          <label class="form-label" for="id_password">Contraseña</label>
          <input class="form-control" type="password" name="password" required id="id_password">
        </div>
        <button class="btn btn-brand w-100" type="submit">Ingresar</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
