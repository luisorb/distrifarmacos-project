<div class="app-card p-4">
  <div class="mb-4">
    <h1 class="h4 mb-1">{{ title }}</h1>
    {% if description %}<p class="text-muted mb-0">{{ description }}</p>{% endif %}
  </div>
  <form method="post" action="{{ action|default:request.path }}" {% if form.is_multipart %}enctype="multipart/form-data"{% endif %} {% if ajax %}data-ajax-form="true"{% endif %}>
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <div class="d-flex flex-wrap gap-2 mt-3">
      <button class="btn btn-brand" type="submit">{{ submit_label|default:"Guardar" }}</button>
      {% if cancel_url %}<a class="btn btn-outline-secondary" href="{{ cancel_url }}">Cancelar</a>{% endif %}
    </div>
  </form>
</div>
